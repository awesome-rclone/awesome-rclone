name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject README into index.html
        run: |
          python3 -c "
          with open('index.html', 'r') as f:
              html = f.read()
          with open('README.md', 'r') as f:
              readme = f.read()
          old = '<script id=\"readme-source\" type=\"text/plain\"></script>'
          new = '<script id=\"readme-source\" type=\"text/plain\">\n' + readme + '\n    </script>'
          with open('index.html', 'w') as f:
              f.write(html.replace(old, new))
          "

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
